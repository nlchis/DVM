        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }

        }
        .chart-container { position: relative; height: 240px; width: 100%; }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }

<body class="overflow-x-hidden">
<!-- Side Navigation Bar -->
<aside class="fixed left-0 top-0 h-full w-[260px] bg-sidebar-navy shadow-md flex flex-col py-6 z-50">
<div class="px-6 mb-10">
<h1 class="font-display-lg text-display-lg font-bold text-white tracking-tighter">Logistics Pro</h1>
<p class="font-label-md text-label-md text-secondary-fixed-dim opacity-70">Management Portal</p>
</div>
<nav class="flex-grow flex flex-col space-y-1 px-3">
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-white font-bold border-l-4 border-primary bg-primary-container/20 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-secondary-container dark:text-secondary-fixed-dim hover:bg-primary-container/10 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-md text-label-md">Order Management</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-secondary-container dark:text-secondary-fixed-dim hover:bg-primary-container/10 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
<span class="font-label-md text-label-md">Create Shipment</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-secondary-container dark:text-secondary-fixed-dim hover:bg-primary-container/10 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-label-md text-label-md">Statistics</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-secondary-container dark:text-secondary-fixed-dim hover:bg-primary-container/10 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</a>
</nav>
<div class="px-6 mt-auto">
<button class="w-full bg-primary py-3 rounded-lg text-white font-bold hover:bg-primary-container transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add">add</span>
                New Shipment
            </button>
</div>
</aside>
<!-- Top Navigation Bar -->

<h2 class="font-headline-md text-headline-md font-extrabold text-primary dark:text-inverse-primary">Dashboard Overview</h2>
<div class="relative w-80">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-full text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none" placeholder="Search orders, shipments..." type="text"/>
